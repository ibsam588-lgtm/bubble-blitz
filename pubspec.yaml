name: bubble_blitz
description: Bubble Blitz - Retro 2D platformer
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.18.0
  flame_audio: ^2.1.1
  audioplayers: ^6.0.0
  google_mobile_ads: ^5.1.0
  in_app_purchase: ^3.1.13
  shared_preferences: ^2.2.3
  provider: ^6.1.2
  go_router: ^13.2.0
  lottie: ^3.1.0
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  vibration: ^2.0.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
    - assets/fonts/
