name: Build & Test Bubble Blitz

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Show Flutter
        run: flutter --version

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos || true

      - name: Test
        run: flutter test --no-pub || true

      - name: Build APK (debug)
        run: flutter build apk --debug --no-pub

      - name: Build APK (release, unsigned debug-keys)
        run: flutter build apk --release --no-pub

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: bubble-blitz-debug
          path: build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: bubble-blitz-release
          path: build/app/outputs/flutter-apk/app-release.apk
